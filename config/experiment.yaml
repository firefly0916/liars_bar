api:
  timeout_seconds: 60
runtime:
  max_turns: 120
  random_seed: 42
  fallback_action: challenge
  enable_null_player_probe: false
parser:
  max_retries: 3
  allow_markdown_json: true
  allow_key_alias: true
logging:
  run_log_dir: logs/runs
  level: INFO
players:
  - player_id: p1
    name: Alice
    agent_type: mock
    model: openai/gpt-4o-mini
    prompt_profile: baseline
    temperature: 0.2
  - player_id: p2
    name: Bob
    agent_type: mock
    model: anthropic/claude-3.5-sonnet
    prompt_profile: baseline
    temperature: 0.2
rules:
  deck_ranks: [A, K, Q, JOKER]
  cards_per_player: 5
  roulette_slots: 6
  enable_items: false
