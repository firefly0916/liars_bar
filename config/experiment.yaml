api:
  api_key: LOCAL
  base_url: local://hf
  timeout_seconds: 60
runtime:
  max_turns: 120
  random_seed: 42
  fallback_action: challenge
  enable_null_player_probe: false
  null_probe_action_probability: 0.12
parser:
  max_retries: 3
  allow_markdown_json: true
  allow_key_alias: true
logging:
  run_log_dir: logs/llm_drill
  level: INFO
players:
  - player_id: p1
    name: Drill-LLM
    agent_type: llm
    model: Qwen/Qwen2.5-0.5B-Instruct
    prompt_profile: baseline
    temperature: 0.0
  - player_id: p2
    name: Mock-2
    agent_type: mock
    model: mock-a
    prompt_profile: baseline
    temperature: 0.2
  - player_id: p3
    name: Mock-3
    agent_type: mock
    model: mock-b
    prompt_profile: baseline
    temperature: 0.2
  - player_id: p4
    name: Mock-4
    agent_type: mock
    model: mock-c
    prompt_profile: baseline
    temperature: 0.2
rules:
  deck_ranks: [A, K, Q, JOKER]
  cards_per_player: 5
  roulette_slots: 6
  enable_items: false
